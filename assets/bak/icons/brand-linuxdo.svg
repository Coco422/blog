<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" role="img" aria-label="LinuxDO">
  <!-- LinuxDO's official mark: dark, light, and orange horizontal bands. -->
  <defs>
    <clipPath id="linuxdo-mark">
      <circle cx="12" cy="12" r="10.3" />
    </clipPath>
  </defs>
  <circle cx="12" cy="12" r="10.3" fill="#F0F0F0" />
  <g clip-path="url(#linuxdo-mark)">
    <rect x="1.7" y="1.7" width="20.6" height="6.87" fill="#1C1C1E" />
    <rect x="1.7" y="8.57" width="20.6" height="6.86" fill="#F0F0F0" />
    <rect x="1.7" y="15.43" width="20.6" height="6.87" fill="#FFB003" />
  </g>
  <circle cx="12" cy="12" r="10.3" stroke="#FFF" stroke-width="0.8" />
</svg>

baseurl: https://blog.anluoying.com/
languageCode: zh-CN
defaultContentLanguage: zh-cn
title: 安落滢 Blog - 技术分享与生活记录
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

permalinks:
  categories: /categories/:slug/

# Security headers
server:
  headers:
    - for: /**
      values:
        Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net https://giscus.app; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net https://giscus.app; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://giscus.app https://api.github.com; frame-src https://giscus.app"
        Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
        X-Frame-Options: "SAMEORIGIN"
        X-Content-Type-Options: "nosniff"
        Referrer-Policy: "strict-origin-when-cross-origin"
    - for: /giscus-paper.css
      values:
        Access-Control-Allow-Origin: "https://giscus.app"


outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:

# 已配置内容
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: 安落滢 Blog - 技术、生活与思考
  description: "安落滢的博客 - A blog about technology, life, and everything in between."
  keywords: [Blog, Portfolio, PaperMod]
  author: Ray
  DateFormat: "January 2, 2006"
  defaultTheme: light
  disableThemeToggle: true
  images: ["/og-default.png"]

  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  showtoc: true
  tocopen: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true

  taxonomies:
    category: categories
    tag: tags

  # home-info mode
  homeInfoParams:
    Title: "Hi there 👋"
    Content: Welcome to my blog, my name is Ray. I am a software developer and this is my personal blog where I share my thoughts, experiences, and projects. Feel free to explore and connect with me!

  socialIcons:
    - name: x
      url: "https://x.com/@Anluoying"
    - name: github
      url: "https://github.com/coco422"
    - name: linuxdo
      title: "LinuxDO"
      url: "https://linux.do/u/ray521980/summary"
      icon: "bak/icons/brand-linuxdo.svg"

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  comments: true

  neko:
    enable: true
    onlyHome: true
  navI18n:
    defaultLang: zh
    storageKey: anluoying-nav-language
# --------------------未配置--------------------------

  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35
    iconAlt: "安落滢 Blog Logo"

  analytics:
    google:
      SiteVerificationTag: "ray521980"
    bing:
      SiteVerificationTag: "ray521980"
    yandex:
      SiteVerificationTag: "ray521980"

  # editPost:
  #   URL: "https://github.com/Coco422/blog/tree/main/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link


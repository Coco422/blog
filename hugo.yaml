baseURL: https://blog.anluoying.com/
languageCode: zh-CN
defaultContentLanguage: zh-cn
hasCJKLanguage: true
title: 安落滢 Blog
summaryLength: 120
pagination:
  pagerSize: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

permalinks:
  categories: /categories/:slug/

taxonomies:
  category: categories
  tag: tags

related:
  includeNewer: true
  threshold: 25
  toLower: true
  indices:
    - name: tags
      weight: 80
    - name: categories
      weight: 60
    - name: date
      weight: 10
      pattern: "2006"

# Security headers
server:
  headers:
    - for: /**
      values:
        Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' cdn.jsdelivr.net https://giscus.app; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net https://giscus.app; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://giscus.app https://api.github.com; frame-src https://giscus.app"
        Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
        X-Frame-Options: "SAMEORIGIN"
        X-Content-Type-Options: "nosniff"
        Referrer-Policy: "strict-origin-when-cross-origin"
    - for: /giscus-paper.css
      values:
        Access-Control-Allow-Origin: "https://giscus.app"


outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

params:

# 已配置内容
  title: 安落滢 Blog
  description: "安落滢（Ray）的个人技术博客，记录 AI 工具与模型实践、Linux 运维、网络与开发踩坑，也分享生活观察和长期思考。"
  keywords: [AI 工具, 大模型实践, Linux 运维, 网络技术, 开发教程, Hugo 博客, 生活思考]
  author: Ray
  DateFormat: "2006-01-02"
  mainSections: [posts]
  defaultTheme: light
  disableThemeToggle: true
  images: ["/og-default.png"]

  seo:
    homeTitle: "安落滢 Blog｜AI 工具、Linux 运维与开发实践"

  schema:
    publisherType: Person
    siteName: 安落滢 Blog
    alternateName: 安落滢博客
    authorName: Ray
    authorAlternateName: 安落滢
    authorURL: https://blog.anluoying.com/about/
    authorImage: https://blog.anluoying.com/apple-touch-icon.png
    sameAs:
      - https://x.com/Anluoying
      - https://github.com/coco422
      - https://linux.do/u/ray521980/summary

  social:
    twitter: Anluoying

  ShowReadingTime: true
  ShowShareButtons: false
  ShowCodeCopyButtons: true
  ShowWordCount: true
  showtoc: true
  tocopen: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true

  # home-info mode
  homeInfoParams:
    Title: "安落滢 Blog"
    Content: 我是 Ray，一名喜欢折腾的开发者。这里记录 AI 工具与模型实践、Linux 与网络运维、开发踩坑，也写一点生活与思考。

  socialIcons:
    - name: x
      url: "https://x.com/Anluoying"
    - name: github
      url: "https://github.com/coco422"
    - name: linuxdo
      title: "LinuxDO"
      url: "https://linux.do/u/ray521980/summary"
      icon: "bak/icons/brand-linuxdo.svg"

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  comments: true

  neko:
    enable: true
    onlyHome: true
  navI18n:
    defaultLang: zh
    storageKey: anluoying-nav-language
# --------------------未配置--------------------------

  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/safari-pinned-tab.svg"

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35
    iconAlt: "安落滢 Blog Logo"

  # editPost:
  #   URL: "https://github.com/Coco422/blog/tree/main/content"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link

menu:
  main:
    - identifier: About
      name: About
      url: /about/
      weight: 10
      params:
        icon: user
        en: About
        zh: 关于
    - identifier: Links
      name: Links
      url: /links/
      weight: 20
      params:
        icon: link
        en: Links
        zh: 友链
    - identifier: Search
      name: Search
      url: /search/
      weight: 30
      params:
        icon: search
        en: Search
        zh: 搜索
    - identifier: Archives
      name: Archives
      url: /archives/
      weight: 40
      params:
        icon: archives
        en: Archives
        zh: 归档
    - identifier: Categories
      name: Categories
      url: /categories/
      weight: 50
      params:
        icon: categories
        en: Categories
        zh: 分类
    - identifier: Tags
      name: Tags
      url: /tags/
      weight: 60
      params:
        icon: tag
        en: Tags
        zh: 标签
    - identifier: 安落滢
      name: Ray-Site
      url: https://anluoying.com/
      weight: 70
      params:
        icon: home
        en: Ray-Site
        zh: 主站
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
# pygmentsUseClasses: true
markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    tabWidth: 4

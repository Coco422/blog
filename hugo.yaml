      weight: 20
      params:
        icon: link
        en: Links
        zh: 友链
    - identifier: Search
      name: Search
      url: /search/
      weight: 30
      params:
        icon: search
        en: Search
        zh: 搜索
    - identifier: Archives
      name: Archives
      url: /archives/
      weight: 40
      params:
        icon: archives
        en: Archives
        zh: 归档
    - identifier: Categories
      name: Categories
      url: /categories/
      weight: 50
